<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/Global.css">
	<link rel="stylesheet" href="css/Account.css">
	<link rel="stylesheet" href="css/MenuBar.css">
	<title>Home</title>
</head>
<body id="PageAccount">
	<div class="MenuBarFixed">
		<div class="MenuBar">
			<a href="/Home" class="MenuBarButton" id="PageHomeBar">
				<img class="MenuBarImg" src="img/icn/Home.svg">
				<span class="MenuBarSpan">Home</span>
			</a>
			<a href="/Dart" class="MenuBarButton" id="PageDartBar">
				<img class="MenuBarImg" src="img/icn/Dart.svg">
				<span class="MenuBarSpan">Dart</span>
			</a>
			<a href="/Score" class="MenuBarButton" id="PageScoreBar">
				<img class="MenuBarImg" src="img/icn/Score.svg">
				<span class="MenuBarSpan">Score</span>
			</a>
			<a href="/Account" class="MenuBarButton" id="PageAccountBar">
				<img class="MenuBarImg" src="img/icn/Account.svg">
				<span class="MenuBarSpan">Account</span>
			</a>
		</div>
	</div>
	<div class="Content">
		<div class="AccountCard">
			<div class="TabGroup">
				<button class="TabBtn active" onclick="showLogin()">Connexion</button>
				<button class="TabBtn" onclick="showSignup()">Subscribe</button>
			</div>
			<form id="SigninForm" method="POST" action="/signin" class="AccountForm">
				<div class="InputGroup">
					<input type="text" name="username" placeholder="Username" required>
				</div>
				<div class="InputGroup">
					<input type="password" name="password" placeholder="Password" required>
				</div>
				<button type="submit" class="SubmitButton">Login</button>
			</form>
			<form id="SignupForm" class="AccountForm" method="POST" action="/signup" style="display:none;">
				<div class="InputGroup">
					<input type="text" name="username" placeholder="Username" required>
				</div>
				<div class="InputGroup">
					<input type="email" name="email" placeholder="E-mail" required>
				</div>
				<div class="InputGroup">
					<input type="password" name="password" placeholder="Password" required>
				</div>
				<button type="submit" class="SubmitButton">Join us</button>
			</form>
		</div>
	</div>
	<script>
    function showLogin()
	{
        document.getElementById('SigninForm').style.display = 'flex';
        document.getElementById('SignupForm').style.display = 'none';
        document.querySelectorAll('.TabBtn')[0].classList.add('active');
        document.querySelectorAll('.TabBtn')[1].classList.remove('active');
    }
    function showSignup() {
        document.getElementById('SigninForm').style.display = 'none';
        document.getElementById('SignupForm').style.display = 'flex';
        
        document.querySelectorAll('.TabBtn')[1].classList.add('active');
        document.querySelectorAll('.TabBtn')[0].classList.remove('active');
    }
	</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/Global.css">
	<link rel="stylesheet" href="css/MenuBar.css">
	<link rel="stylesheet" href="css/Dart.css">
	<script src="js/GameModeDart.js" defer></script>
	<title>Home</title>
</head>
<body id="PageDart">
	<div class="MenuBarFixed">
		<div class="MenuBar">
			<a href="/Home" class="MenuBarButton" id="PageHomeBar">
				<img class="MenuBarImg" src="img/icn/Home.svg">
				<span class="MenuBarSpan">Home</span>
			</a>
			<a href="/Dart" class="MenuBarButton" id="PageDartBar">
				<img class="MenuBarImg" src="img/icn/Dart.svg">
				<span class="MenuBarSpan">Dart</span>
			</a>
			<a href="/Score" class="MenuBarButton" id="PageScoreBar">
				<img class="MenuBarImg" src="img/icn/Score.svg">
				<span class="MenuBarSpan">Score</span>
			</a>
			<a href="/Account" class="MenuBarButton" id="PageAccountBar">
				<img class="MenuBarImg" src="img/icn/Account.svg">
				<span class="MenuBarSpan">Account</span>
			</a>
		</div>
	</div>
	<div class="GameModeParam">
		<div class="GameModeParamParticipant">
			<button class="AddPlayerButton" onclick="AskPlayerName()">Add a Player</button>
			<ul class="ListPlayerUl">
				<li>
					<div>Player_1</div>
					<input class="InputPlayerName" type="checkbox" value="Player_1">
				</li>
				<li>
					<div>Player_2</div>
					<input class="InputPlayerName" type="checkbox" value="Player_2">
				</li>
				<li>
					<div>Player_3</div>
					<input class="InputPlayerName" type="checkbox" value="Player_3">
				</li>
				<li>
					<div>Player_4</div>
					<input class="InputPlayerName" type="checkbox" value="Player_4">
				</li>
			</ul>
		</div>

		<div class="SettingsGameMode">
			<div class="ParamLigne">
				<div class="ParamType">Mode</div>
				<div class="ParamChoice">
					<ul class="ListParamGameMode GameChoiceList">
						<li><input value="Classic" onclick="ChangeGameMode('ClassicMode')" checked type="radio" name="GameModeInput"> <label>Classic</label></li>
						<li><input value="Cricket" onclick="ChangeGameMode('CricketMode')" type="radio" name="GameModeInput"> <label>Cricket</label></li>
						<li><input value="WorldTour" onclick="ChangeGameMode('WorldTourMode')" type="radio" name="GameModeInput"> <label>Tour du Monde</label></li>
						<li><input value="Killer" onclick="ChangeGameMode('KillercMode')" type="radio" name="GameModeInput"> <label>Killer</label></li>
					</ul>
				</div>
			</div>

			<div class="ParamLigne AllMode ClassicMode CricketMode WorldTourMode KillercMode">
				<div class="ParamType">Manche</div>
				<div class="ParamChoice">
					<div  class="StartScoreChoice">
						<button onclick="ChangeScore(-1,'NbLegInput')">-</button>
						<input class="NbLegInput" oninput="if (this.value <= 0) this.value = 1" type="number" min="1" value="1" step="1">
						<button onclick="ChangeScore(1,'NbLegInput')">+</button>
					</div>
				</div>
			</div>

			<div class="ParamLigne AllMode ClassicMode CricketMode WorldTourMode KillercMode" >
				<div class="ParamType">Set</div>
				<div class="ParamChoice">
					<div  class="StartScoreChoice">
						<button onclick="ChangeScore(-1,'NbSetInput')">-</button>
						<input class="NbSetInput" oninput="if (this.value <= 0) this.value = 1" type="number" min="1" value="1" step="1">
						<button onclick="ChangeScore(1,'NbSetInput')">+</button>
					</div>
				</div>
			</div>

			<div class="ParamLigne AllMode ClassicMode">
				<div class="ParamType">Score</div>
				<div class="ParamChoice">
					<div  class="StartScoreChoice">
						<button onclick="ChangeScore(-100,'StartScoreInput')">-</button>
						<input class="StartScoreInput" oninput="if (this.value <= 0) this.value = 1" type="number" min="1" value="501" step="100">
						<button onclick="ChangeScore(100,'StartScoreInput')">+</button>
					</div>
				</div>
			</div>

			<div class="ParamLigne AllMode ClassicMode">
				<div class="ParamType">Entree</div>
				<div class="ParamChoice">
					<ul class="CheckInType GameChoiceList">
						<li><input checked type="radio" name="CheckInTypeInput" value="Simple"> <label>Simple</label></li>
						<li><input type="radio" name="CheckInTypeInput" value="Double"> <label>Double</label></li>
						<li><input type="radio" name="CheckInTypeInput" value="Triple"> <label>Triple</label></li>
					</ul>
				</div>
			</div>

			<div class="ParamLigne AllMode ClassicMode">
				<div class="ParamType">Sortie</div>
				<div class="ParamChoice">
					<ul class="CheckOutType GameChoiceList">
						<li><input type="radio" name="CheckOutTypeInput" value="Simple"> <label>Simple</label></li>
						<li><input checked type="radio" name="CheckOutTypeInput" value="Double"> <label>Double</label></li>
						<li><input type="radio" name="CheckOutTypeInput" value="Triple"> <label>Triple</label></li>
					</ul>
				</div>
			</div>

			<div class="ParamLigne AllMode CricketMode">
				<div class="ParamType">Mode de Point</div>
				<div class="ParamChoice">
					<ul class="PointModeList GameChoiceList">
						<li><input type="radio" name="PointModeInput"> <label>No Score</label></li>
						<li><input type="radio" name="PointModeInput"> <label>Classic</label></li>
						<li><input checked type="radio" name="PointModeInput"> <label>Cut-Throat</label></li>
					</ul>
				</div>
			</div>

			<div class="ParamLigne AllMode CricketMode">
				<div class="ParamType">Numero</div>
				<div class="ParamChoice">
					<ul class="NumeroChoiceList GameChoiceList">
						<li><input checked type="radio" name="NumeroChoiceInput"> <label>Classic</label></li>
						<li><input type="radio" name="NumeroChoiceInput"> <label>Random</label></li>
						<li><input type="radio" name="NumeroChoiceInput"> <label>Au choix</label></li>
						<li><input type="radio" name="NumeroChoiceInput"> <label>First Hit</label></li>
					</ul>
				</div>
			</div>

			<div class="ParamLigne AllMode WorldTourMode">
				<div class="ParamType">Ordre</div>
				<div class="ParamChoice">
					<ul class="OrderWorldTourList GameChoiceList">
						<li><input checked type="radio" name="OrderWorldTourInput"> <label>Ascendant</label></li>
						<li><input type="radio" name="OrderWorldTourInput"> <label>Descendant</label></li>
						<li><input type="radio" name="OrderWorldTourInput"> <label>Random</label></li>
						<li><input type="radio" name="OrderWorldTourInput"> <label>Sans ordre</label></li>
						<li><input type="radio" name="OrderWorldTourInput"> <label>Horaire</label></li>
						<li><input type="radio" name="OrderWorldTourInput"> <label>Anti Horaire</label></li>
					</ul>
				</div>
			</div>

			<div class="ParamLigne AllMode WorldTourMode">
				<div class="ParamType">Precision</div>
				<div class="ParamChoice">
					<ul class="PrecisionList GameChoiceList">
						<li><input onclick="RadioCheckBox('AimVersion',this)" type="checkbox" name="AimVersion"> <label>Close Center Only</label></li>
						<li><input onclick="RadioCheckBox('AimVersion',this)" type="checkbox" name="AimVersion"> <label>Only Double</label></li>
						<li><input onclick="RadioCheckBox('AimVersion',this)" type="checkbox" name="AimVersion"> <label>Only Triple</label></li>
						<li><input onclick="RadioCheckBox('AimVersion',this)" type="checkbox" name="AimVersion"> <label>Double and Triple</label></li>
					</ul>
				</div>
			</div>

			<div class="ParamLigne AllMode WorldTourMode">
				<div class="ParamType">Variante</div>
				<div class="ParamChoice">
					<ul class="VarianteWorldTourList GameChoiceList">
						<li><input type="checkbox"> <label>Busting</label></li>
						<li><input type="checkbox"> <label>Skipping</label></li>
					</ul>
				</div>
			</div>

			<div class="ParamLigne AllMode KillercMode">
				<div class="ParamType">Vie</div>
				<div class="ParamChoice">
					<div  class="StartScoreChoice">
						<button onclick="ChangeScore(-1,'NbLifeInput')">-</button>
						<input class="NbLifeInput" oninput="if (this.value <= 0) this.value = 1" type="number" min="1" value="3" step="1">
						<button onclick="ChangeScore(1,'NbLifeInput')">+</button>
					</div>
				</div>
			</div>

			<div class="ParamLigne AllMode KillercMode">
				<div class="ParamType">Variante</div>
				<div class="ParamChoice">
					<ul class="VarianteWorldTourList GameChoiceList">
						<li><input type="checkbox"> <label>Killer Double</label></li>
						<li><input type="checkbox"> <label>Killer Triple</label></li>
						<li><input type="checkbox"> <label>Vol de Vie</label></li>
					</ul>
				</div>
			</div>

			<div class="ButtonPlayParent">
				<button onclick="PlayGame()" class="ButtonPlay">Play</button>
			</div>
			
		</div>
	</div>
	<div class="FixedGameAll">
		<div class="FixedGameAllRelative">
			<div class="CrossGameAll">
				<div class="GameModeTitle">
					Classic
				</div>
				<button onclick="CloseGame()">
					<img src="img/png/cross.png">
				</button>
			</div>
			<div class="GameAllDiv">
				<div class="PlayerListOnGame">
				</div>
				<div class="SelectPointDoAll">
					<table>
						<tbody>
							<tr>
								<td onclick="AddScore(25)">25</td>
								<td onclick="AddScore(20)">20</td>
								<td onclick="AddScore(19)">19</td>
								<td onclick="AddScore(18)">18</td>
								<td onclick="AddScore(17)">17</td>
								<td onclick="AddScore(16)">16</td>
								<td onclick="AddScore(15)">15</td>
							</tr>
							<tr>
								<td onclick="AddScore(14)">14</td>
								<td onclick="AddScore(13)">13</td>
								<td onclick="AddScore(12)">12</td>
								<td onclick="AddScore(14)">11</td>
								<td onclick="AddScore(10)">10</td>
								<td onclick="AddScore(9)">9</td>
								<td onclick="AddScore(8)">8</td>
							</tr>
							<tr>
								<td onclick="AddScore(7)">7</td>
								<td onclick="AddScore(6)">6</td>
								<td onclick="AddScore(5)">5</td>
								<td onclick="AddScore(4)">4</td>
								<td onclick="AddScore(3)">3</td>
								<td onclick="AddScore(2)">2</td>
								<td onclick="AddScore(1)">1</td>
							</tr>
							<tr>
								<td onclick="AddScore(0)">0</td>
								<td onclick="ChangeMultiplier(2)" colspan="2">Double</td>
								<td onclick="ChangeMultiplier(3)" colspan="2">Triple</td>
								<td onclick="RollBackDart()" colspan="2">Retour</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
			<div class="PopUpWinPlayer">
				<div class="TextWinnerPlayer"></div>
			</div>
		</div>
	</div>
</body>
</html>
